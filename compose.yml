services:

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - easypanel
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.crm-frontend.rule=Host(`${DOMAIN}`) && !PathPrefix(`/api`) && !PathPrefix(`/webhooks`) && !PathPrefix(`/socket.io`)"
      - "traefik.http.routers.crm-frontend.entrypoints=websecure"
      - "traefik.http.routers.crm-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-frontend.loadbalancer.server.port=3000"
    restart: unless-stopped

  # ─── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      # Dominio — para CORS y cookies
      FRONTEND_URL: https://${DOMAIN}
      # Base de datos
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/kodevoncrm
      # Redis
      REDIS_URL: redis://redis:6379
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      # Cifrado de credenciales de canales
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # EspoCRM (red interna Docker)
      ESPOCRM_URL: ${ESPOCRM_URL}
      ESPOCRM_API_KEY: ${ESPOCRM_API_KEY}
      # Gmail OAuth
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_EMAIL: ${GMAIL_EMAIL}
      # WhatsApp / Meta
      WA_PHONE_NUMBER_ID: ${WA_PHONE_NUMBER_ID}
      WA_ACCESS_TOKEN: ${WA_ACCESS_TOKEN}
      WA_WEBHOOK_VERIFY_TOKEN: ${WA_WEBHOOK_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET}
      META_PAGE_ID: ${META_PAGE_ID}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN}
      META_IG_ACCOUNT_ID: ${META_IG_ACCOUNT_ID}
      # Web Push VAPID
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@kodevon.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easypanel
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.crm-backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.crm-backend.entrypoints=websecure"
      - "traefik.http.routers.crm-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-backend.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      # start_period: tiempo que le damos al entrypoint para correr prisma db push
      # antes de que empiecen a contar los retries del healthcheck
      start_period: 60s
    restart: unless-stopped

  # ─── Worker ─────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/kodevoncrm
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ESPOCRM_URL: ${ESPOCRM_URL}
      ESPOCRM_API_KEY: ${ESPOCRM_API_KEY}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kodevoncrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Ollama ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    mem_limit: ${OLLAMA_MEM_LIMIT:-3g}
    memswap_limit: ${OLLAMA_MEM_LIMIT:-3g}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  easypanel:
    external: true
  internal:
    driver: bridge
